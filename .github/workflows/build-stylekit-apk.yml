name: Build StyleKit APK

# Triggered on:
#   - pushes to main / master
#   - pull requests
#   - manual dispatch (with a "Build variant" dropdown)
#
# Produces a debug APK artifact you can download from the Actions tab.
# The APK is ready to sideload on any Android 8.0+ device.

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
      - ".dockerignore"
      - ".editorconfig"
      - "fastlane/**"
      - "AI_POLICY.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

# Cancel any in-flight run when a new commit is pushed — saves runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          # AGP 9.0.0 + Kotlin 2.3.20 like JDK 21. JDK 17 also works for the
          # Kotlin/Java compile, but the Gradle 9.4.1 wrapper is happiest on 21.
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Components installed by setup-android. The project's build.gradle.kts
          # pins compileSdk=36 and NDK 29.0.14206865 (see gradle/tools.versions.toml).
          packages: |
            platforms;android-36
            build-tools;36.0.0
            ndk;29.0.14206865
            cmake;3.22.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache Gradle's deps + the Kotlin compile cache. Big speedup on reruns.
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Determine build type
        id: variant
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=stylekit-florisboard-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          else
            echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=stylekit-florisboard-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ${{ steps.variant.outputs.task }}
        run: ./gradlew ${{ steps.variant.outputs.task }} --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp "${{ steps.variant.outputs.apk_path }}" "artifacts/${{ steps.variant.outputs.artifact_name }}"
          ls -la artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.variant.outputs.artifact_name }}
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7
          if-no-files-found: ignore
